<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta name="googlebot" content="noindex, nofollow">
<meta name="description" content="">
<title>비밀입니다</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500&family=IBM+Plex+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans KR', sans-serif; background: #f4f6f9; min-height: 100vh; color: #1a1a2e; }

.app-bar { background: #1A5FBE; padding: 0 2rem; height: 56px; display: flex; align-items: center; gap: 12px; }
.logo { width: 28px; height: 28px; background: rgba(255,255,255,0.2); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: white; }
.app-bar h1 { font-size: 15px; font-weight: 500; color: white; }
.badge { margin-left: auto; background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.9); font-size: 11px; padding: 3px 10px; border-radius: 20px; }

.main { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; display: grid; grid-template-columns: 300px 1fr; gap: 1.5rem; align-items: start; }

.panel { background: white; border-radius: 12px; border: 1px solid #e5e8ef; overflow: hidden; margin-bottom: 1rem; }
.ph { padding: 13px 18px; border-bottom: 1px solid #f0f2f7; font-size: 13px; font-weight: 600; }
.pb { padding: 18px; }

.field { margin-bottom: 14px; }
.field label { display: block; font-size: 11px; font-weight: 600; color: #6b7280; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 6px; }
.field input[type=text] { width: 100%; padding: 9px 12px; font-size: 13px; font-family: 'IBM Plex Sans KR', sans-serif; border: 1px solid #e5e8ef; border-radius: 8px; background: #fafbfc; color: #1a1a2e; outline: none; }
.field input[type=text]:focus { border-color: #1A5FBE; background: white; }
.field input[type=text]::placeholder { color: #c0c8d8; }

.sr { display: flex; align-items: center; gap: 10px; }
.sr input[type=range] { flex: 1; -webkit-appearance: none; height: 4px; background: #e5e8ef; border-radius: 4px; border: none; padding: 0; outline: none; }
.sr input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: #1A5FBE; border-radius: 50%; cursor: pointer; }
.sv { min-width: 36px; text-align: right; font-size: 12px; font-weight: 600; color: #1A5FBE; }

.divider { height: 1px; background: #f0f2f7; margin: 14px 0; }
.swatch { height: 56px; background: #1A5FBE; border-radius: 8px; overflow: hidden; margin-bottom: 14px; }

.upload-zone { border: 2px dashed #d1d8e8; border-radius: 10px; padding: 1.5rem 1rem; text-align: center; cursor: pointer; transition: all 0.15s; background: #fafbfc; margin-bottom: 14px; }
.upload-zone:hover, .upload-zone.drag { border-color: #1A5FBE; background: #EEF4FF; }
.upload-zone .ut { font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 3px; }
.upload-zone .us { font-size: 11px; color: #9ca3af; }

.file-info { display: none; background: #f0f7ff; border: 1px solid #bdd7ff; border-radius: 8px; padding: 10px 14px; font-size: 12px; color: #1A5FBE; font-weight: 500; margin-bottom: 14px; align-items: center; gap: 8px; }
.file-info.show { display: flex; }
.rm { margin-left: auto; background: none; border: none; cursor: pointer; color: #9ca3af; font-size: 18px; line-height: 1; }

.btn-main { width: 100%; padding: 13px; background: #1A5FBE; color: white; border: none; border-radius: 9px; font-size: 14px; font-weight: 600; font-family: 'IBM Plex Sans KR', sans-serif; cursor: pointer; }
.btn-main:hover:not(:disabled) { background: #1550A0; }
.btn-main:disabled { opacity: 0.4; cursor: not-allowed; }

.preview-panel { background: white; border-radius: 12px; border: 1px solid #e5e8ef; overflow: hidden; position: sticky; top: 2rem; }
.ptoolbar { padding: 10px 16px; border-bottom: 1px solid #f0f2f7; display: flex; align-items: center; gap: 10px; background: #fafbfc; }
.ptoolbar span { font-size: 12px; color: #6b7280; font-weight: 500; }
.pnav { display: flex; align-items: center; gap: 6px; margin-left: auto; }
.pnav button { width: 26px; height: 26px; border: 1px solid #e5e8ef; border-radius: 6px; background: white; cursor: pointer; font-size: 14px; color: #374151; display: flex; align-items: center; justify-content: center; }
.pnav button:hover:not(:disabled) { border-color: #1A5FBE; color: #1A5FBE; }
.pnav button:disabled { opacity: 0.3; cursor: not-allowed; }
.pinfo { font-size: 12px; color: #6b7280; min-width: 60px; text-align: center; }

.cwrap { padding: 16px; background: #e8ecf3; min-height: 340px; display: flex; align-items: center; justify-content: center; }
#cv { max-width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,0.15); border-radius: 2px; display: none; }
.empty { text-align: center; color: #9ca3af; font-size: 13px; line-height: 1.8; }

.pbar { display: none; height: 3px; background: #e5e8ef; }
.pbar.show { display: block; }
.pfill { height: 100%; background: #1A5FBE; transition: width 0.2s; width: 0%; }

.smsg { padding: 8px 16px; font-size: 12px; color: #6b7280; background: #fafbfc; border-top: 1px solid #f0f2f7; min-height: 32px; display: none; align-items: center; }
.smsg.show { display: flex; }

.dbar { display: none; padding: 14px 16px; border-top: 1px solid #f0f2f7; background: #fafbfc; align-items: center; gap: 10px; }
.dbar.show { display: flex; }
.dinfo { font-size: 12px; color: #6b7280; }
.btn-dl { padding: 10px 20px; background: #1A5FBE; color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; font-family: 'IBM Plex Sans KR', sans-serif; cursor: pointer; margin-left: auto; }
.btn-dl:hover { background: #1550A0; }
</style>
</head>
<body>

<div class="app-bar">
  <div class="logo">참</div>
  <h1>참약사 인쇄용 워터마크</h1>
  <span class="badge">CONFIDENTIAL · 대외비</span>
</div>

<div class="main">
  <!-- 왼쪽 설정 -->
  <div>
    <div class="panel">
      <div class="ph">워터마크 설정</div>
      <div class="pb">
        <div class="field">
          <label>약국명</label>
          <input type="text" id="iName" placeholder="예: 어쩌고약국" oninput="updateSwatch()">
        </div>
        <div class="field">
          <label>약사명 (선택입력) ㅣ [참고] 워터마크에 생성일은 자동으로 입력됩니다. </label>
          <input type="text" id="iExtra" placeholder="예: 테스트 약사님" oninput="updateSwatch()">
        </div>
        <div class="divider"></div>
        <div class="field">
          <label>글자 크기</label>
          <div class="sr">
            <input type="range" id="iSize" min="35" max="80" value="40" step="1" oninput="updateSwatch(); document.getElementById('vSize').textContent=this.value+'pt'">
            <span class="sv" id="vSize">40pt</span>
          </div>
        </div>
        <div class="field">
          <label>투명도</label>
          <div class="sr">
            <input type="range" id="iOpacity" min="3" max="30" value="10" step="1" oninput="updateSwatch(); document.getElementById('vOpacity').textContent=this.value+'%'">
            <span class="sv" id="vOpacity">10%</span>
          </div>
        </div>
        <div class="field">
          <label>간격</label>
          <div class="sr">
            <input type="range" id="iSpacing" min="30" max="300" value="200" step="5" oninput="updateSwatch(); document.getElementById('vSpacing').textContent=this.value">
            <span class="sv" id="vSpacing">200</span>
          </div>
        </div>
        <div class="divider"></div>
        <div class="field">
          <label>미리보기</label>
          <div class="swatch" id="swatch"></div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="ph">PDF 파일</div>
      <div class="pb">
        <div class="upload-zone" id="zone">
          <p class="ut">PDF 파일 올려주세요</p>
          <p class="us">클릭하거나 드래그</p>
        </div>
        <input type="file" id="fileInput" accept=".pdf" style="display:none">
        <div class="file-info" id="fileInfo">
          <span id="fName"></span>
          <span id="fPages" style="color:#9ca3af;font-weight:400;"></span>
          <button class="rm" id="rmBtn">×</button>
        </div>
        <button class="btn-main" id="processBtn" disabled>워터마크 삽입 클릭</button>
      </div>
    </div>
  </div>

  <!-- 오른쪽 미리보기 -->
  <div class="preview-panel">
    <div class="ptoolbar">
      <span>미리보기 ㅣ [참고] 미리보기에 첫 장만 표시되더라도 당황하지 말고 다운로드하세요!</span>
      <div class="pnav">
        <button id="btnPrev" disabled>‹</button>
        <span class="pinfo" id="pageInfo">— / —</span>
        <button id="btnNext" disabled>›</button>
      </div>
    </div>
    <div class="pbar" id="pbar"><div class="pfill" id="pfill"></div></div>
    <div class="smsg" id="smsg"></div>
    <div class="cwrap">
      <div class="empty" id="emptyState">PDF를 업로드하면<br>여기서 미리볼 수 있어요</div>
      <canvas id="cv"></canvas>
    </div>
    <div class="dbar" id="dbar">
      <span class="dinfo" id="dinfo"></span>
      <button class="btn-dl" id="btnDl">↓ 다운로드</button>
    </div>
  </div>
</div>

<script>
// ── pdf.js, pdf-lib 순서대로 로드 ──
(function() {
  function loadScript(src, cb) {
    var s = document.createElement('script');
    s.src = src;
    s.onload = cb;
    s.onerror = function() { alert('라이브러리 로딩 실패: ' + src); };
    document.head.appendChild(s);
  }

  // pdf.js 먼저, 로드 완료 후 pdf-lib 로드, 그 다음 앱 초기화
  loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js', function() {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js', function() {
      initApp();
    });
  });
})();

function initApp() {
  var pdfFile = null;
  var pdfJsDoc = null;
  var currentPage = 1;
  var totalPages = 0;
  var resultBytes = null;
  var outName = 'watermarked.pdf';

  var zone = document.getElementById('zone');
  var fileInput = document.getElementById('fileInput');
  var fileInfo = document.getElementById('fileInfo');
  var processBtn = document.getElementById('processBtn');
  var btnPrev = document.getElementById('btnPrev');
  var btnNext = document.getElementById('btnNext');
  var cv = document.getElementById('cv');
  var emptyState = document.getElementById('emptyState');
  var dbar = document.getElementById('dbar');

  // 업로드 이벤트
  zone.addEventListener('click', function() { fileInput.click(); });
  zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.classList.add('drag'); });
  zone.addEventListener('dragleave', function() { zone.classList.remove('drag'); });
  zone.addEventListener('drop', function(e) {
    e.preventDefault(); zone.classList.remove('drag');
    var f = e.dataTransfer.files[0];
    if (f) loadFile(f);
  });
  fileInput.addEventListener('change', function() {
    if (fileInput.files[0]) loadFile(fileInput.files[0]);
  });
  document.getElementById('rmBtn').addEventListener('click', resetFile);
  processBtn.addEventListener('click', runProcess);
  btnPrev.addEventListener('click', function() { changePage(-1); });
  btnNext.addEventListener('click', function() { changePage(1); });
  document.getElementById('btnDl').addEventListener('click', doDownload);

  function loadFile(file) {
    if (!file.name.toLowerCase().endsWith('.pdf')) {
      alert('PDF 파일만 업로드 가능합니다.');
      return;
    }
    pdfFile = file;
    resultBytes = null;
    dbar.classList.remove('show');

    var reader = new FileReader();
    reader.onload = function(e) {
      var data = e.target.result;
      pdfjsLib.getDocument({ data: data }).promise.then(function(doc) {
        pdfJsDoc = doc;
        totalPages = doc.numPages;
        currentPage = 1;

        document.getElementById('fName').textContent = file.name;
        document.getElementById('fPages').textContent = '· ' + totalPages + '페이지';
        fileInfo.classList.add('show');
        zone.style.display = 'none';
        processBtn.disabled = false;
        updateNav();
        renderFromDoc(pdfJsDoc, currentPage);
      }).catch(function(err) {
        alert('PDF 불러오기 실패: ' + err.message);
      });
    };
    reader.onerror = function() { alert('파일 읽기 실패'); };
    reader.readAsArrayBuffer(file);
  }

  function resetFile() {
    pdfFile = null; pdfJsDoc = null; resultBytes = null;
    currentPage = 1; totalPages = 0;
    fileInfo.classList.remove('show');
    zone.style.display = 'block';
    fileInput.value = '';
    processBtn.disabled = true;
    cv.style.display = 'none';
    emptyState.style.display = 'block';
    document.getElementById('pageInfo').textContent = '— / —';
    btnPrev.disabled = true; btnNext.disabled = true;
    dbar.classList.remove('show');
    setStatus(''); setProgress(null);
  }

  function updateNav() {
    document.getElementById('pageInfo').textContent = currentPage + ' / ' + totalPages;
    btnPrev.disabled = currentPage <= 1;
    btnNext.disabled = currentPage >= totalPages;
  }

  function changePage(d) {
    var n = currentPage + d;
    if (n < 1 || n > totalPages) return;
    currentPage = n; updateNav();
    if (resultBytes) {
      pdfjsLib.getDocument({ data: resultBytes }).promise.then(function(doc) {
        renderFromDoc(doc, currentPage);
      });
    } else {
      renderFromDoc(pdfJsDoc, currentPage);
    }
  }

  function renderFromDoc(doc, pageNum) {
    doc.getPage(pageNum).then(function(page) {
      var vp = page.getViewport({ scale: 1.3 });
      cv.width = vp.width; cv.height = vp.height;
      cv.style.display = 'block';
      emptyState.style.display = 'none';
      page.render({ canvasContext: cv.getContext('2d'), viewport: vp });
    });
  }

  function setProgress(pct) {
    var bar = document.getElementById('pbar');
    var fill = document.getElementById('pfill');
    if (pct === null) { bar.classList.remove('show'); fill.style.width = '0%'; return; }
    bar.classList.add('show'); fill.style.width = pct + '%';
  }

  function setStatus(msg) {
    var el = document.getElementById('smsg');
    if (!msg) { el.classList.remove('show'); el.textContent = ''; return; }
    el.textContent = msg; el.classList.add('show');
  }

  function tick(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

  function getToday() {
    var d = new Date();
    return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
  }

  function buildText() {
    var name = document.getElementById('iName').value.trim() || '약국명';
    var extra = document.getElementById('iExtra').value.trim();
    var today = getToday();
    return 'CONFIDENTIAL  ' + name + (extra ? '  ' + extra : '') + '  ' + today;
  }

  function drawTile(ctx, W, H, text, fontSize, opacity, spacing, color) {
    ctx.save();
    ctx.globalAlpha = opacity;
    ctx.fillStyle = color;
    ctx.font = '500 ' + fontSize + 'px "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif';
    ctx.textBaseline = 'middle';

    var tw = ctx.measureText(text).width;
    var stepX = tw + spacing;
    var stepY = Math.max(spacing * 0.65, fontSize * 2.2);
    var rad = -28 * Math.PI / 180;
    var diag = Math.sqrt(W * W + H * H);
    var cols = Math.ceil(diag / stepX) + 2;
    var rows = Math.ceil(diag / stepY) + 2;

    ctx.translate(W / 2, H / 2);
    ctx.rotate(rad);
    for (var r = -rows; r <= rows; r++) {
      for (var c = -cols; c <= cols; c++) {
        var x = c * stepX + (r % 2) * (stepX / 2) - tw / 2;
        var y = r * stepY;
        ctx.fillText(text, x, y);
      }
    }
    ctx.restore();
  }

  async function runProcess() {
    if (!pdfFile) return;

    var name = document.getElementById('iName').value.trim() || '약국명';
    var extra = document.getElementById('iExtra').value.trim();
    var today = getToday();
    var wmText = buildText();
    var fontSize = parseInt(document.getElementById('iSize').value);
    var opacity = parseInt(document.getElementById('iOpacity').value) / 100;
    var spacing = parseInt(document.getElementById('iSpacing').value);

    processBtn.disabled = true; processBtn.textContent = '처리 중...';
    setProgress(0); setStatus('PDF 읽는 중...');
    await tick(60);

    try {
      // 1. 원본 PDF ArrayBuffer 읽기
      var arrayBuffer = await pdfFile.arrayBuffer();
      setProgress(15); setStatus('PDF 파싱 중...');
      await tick(30);

      // 2. pdf-lib으로 로드
      var pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
      setProgress(25); setStatus('워터마크 이미지 생성 중...');
      await tick(30);

      // 3. 메타데이터 제거
      pdfDoc.setTitle(''); pdfDoc.setAuthor(''); pdfDoc.setSubject('');
      pdfDoc.setKeywords([]); pdfDoc.setProducer(''); pdfDoc.setCreator('');

      var pages = pdfDoc.getPages();
      var refPage = pages[0];
      var refW = refPage.getWidth();
      var refH = refPage.getHeight();

      // 4. 워터마크 canvas 생성 (2x 해상도)
      var scale = 2;
      var offCv = document.createElement('canvas');
      offCv.width = Math.round(refW * scale);
      offCv.height = Math.round(refH * scale);
      var ctx = offCv.getContext('2d');
      ctx.clearRect(0, 0, offCv.width, offCv.height);

      drawTile(ctx, offCv.width, offCv.height, wmText,
        fontSize * scale, opacity, spacing * scale, 'rgba(25,25,90,1)');

      setProgress(45); setStatus('이미지 변환 중...');
      await tick(30);

      // 5. canvas → PNG Uint8Array
      var dataUrl = offCv.toDataURL('image/png');
      var b64 = dataUrl.split(',')[1];
      var binStr = atob(b64);
      var pngBytes = new Uint8Array(binStr.length);
      for (var i = 0; i < binStr.length; i++) pngBytes[i] = binStr.charCodeAt(i);

      setProgress(55); setStatus('PDF에 워터마크 삽입 중...');
      await tick(30);

      // 6. PNG 임베드 후 각 페이지에 삽입
      var wmImg = await pdfDoc.embedPng(pngBytes);

      for (var pi = 0; pi < pages.length; pi++) {
        var pg = pages[pi];
        pg.drawImage(wmImg, { x: 0, y: 0, width: pg.getWidth(), height: pg.getHeight() });
        setProgress(55 + Math.round((pi + 1) / pages.length * 30));
        await tick(0);
      }

      setProgress(88); setStatus('저장 중...');
      await tick(30);

      // 7. base64 data URI로 저장 (Blob/URL 변환 없이 직접 다운로드)
      var dataUri = await pdfDoc.saveAsBase64({ dataUri: true });
      resultBytes = dataUri; // data URI 문자열로 저장

      // 미리보기용 Uint8Array 별도 생성
      var b64 = dataUri.split(',')[1];
      var bin = atob(b64);
      var arr = new Uint8Array(bin.length);
      for (var bi = 0; bi < bin.length; bi++) arr[bi] = bin.charCodeAt(bi);

      setProgress(95); setStatus('미리보기 렌더링 중...');
      await tick(30);

      // 8. 결과 미리보기
      var previewDoc = await pdfjsLib.getDocument({ data: arr }).promise;
      renderFromDoc(previewDoc, currentPage);

      outName = pdfFile.name.replace(/\.pdf$/i, '') + '_' + name.replace(/\s/g, '') + '_' + today.replace(/\./g, '') + '.pdf';
      document.getElementById('dinfo').textContent = pages.length + '페이지 완료 · ' + outName;
      dbar.classList.add('show');

      setProgress(100);
      await tick(700);
      setProgress(null); setStatus('');

    } catch(err) {
      console.error(err);
      alert('오류: ' + err.message);
      setProgress(null); setStatus('');
    }

    processBtn.disabled = false; processBtn.textContent = '워터마크 삽입 후 다운로드';
  }

  function doDownload() {
    if (!resultBytes) return;
    // data URI를 href에 직접 넣어 다운로드 (Blob 변환 없음)
    var a = document.createElement('a');
    a.href = resultBytes;
    a.download = outName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  // swatch
  window.updateSwatch = function() {
    var name = document.getElementById('iName').value || '약국명';
    var extra = document.getElementById('iExtra').value;
    var today = getToday();
    var text = 'CONFIDENTIAL  ' + name + (extra ? '  ' + extra : '') + '  ' + today;
    var opacity = parseInt(document.getElementById('iOpacity').value) / 100;
    var spacing = parseInt(document.getElementById('iSpacing').value);
    var fontSize = parseInt(document.getElementById('iSize').value);

    var el = document.getElementById('swatch');
    el.innerHTML = '';
    var c = document.createElement('canvas');
    c.width = el.offsetWidth || 260; c.height = 56;
    drawTile(c.getContext('2d'), c.width, c.height, text, fontSize * 0.85, opacity, spacing * 0.35, 'rgba(255,255,255,1)');
    el.appendChild(c);
  };

  updateSwatch();
  window.addEventListener('resize', updateSwatch);
}
</script>
</body>
</html>
